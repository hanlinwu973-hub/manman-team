<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manman Elite Royal Blue</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;600&display=swap');

        :root {
            /* 亮丽高级配色：皇家蓝与香槟金 */
            --royal-blue: #1a237e;
            --light-blue: #3f51b5;
            --champagne: #f7e7ce;
            --gold: #d4af37;
            --bg-white: #f8f9fa;
        }

        body {
            background-color: var(--bg-white);
            background-image: radial-gradient(circle at center, #ffffff 0%, #e8eaf6 100%);
            color: #333;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 50px 0;
            width: 100%;
            background: var(--royal-blue);
            border-bottom: 5px solid var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            letter-spacing: 8px;
            color: var(--champagne);
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* 解决两侧太空：淡蓝色装饰 */
        body::before, body::after {
            content: '🐸';
            position: fixed;
            top: 50%;
            font-size: 18vw;
            opacity: 0.05;
            color: var(--light-blue);
            pointer-events: none;
            transform: translateY(-50%);
        }
        body::before { left: 2%; }
        body::after { right: 2%; }

        .main-wrapper {
            width: 90%;
            max-width: 1200px;
            margin-top: 40px;
            padding-bottom: 100px;
            z-index: 10;
        }

        /* 集合模块样式 */
        .category-section {
            margin-bottom: 25px;
            border: 2px solid rgba(26, 35, 126, 0.1);
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .category-header {
            padding: 25px 40px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(90deg, var(--royal-blue), var(--light-blue));
            color: var(--champagne);
        }

        .category-header:hover { opacity: 0.9; }

        .category-title {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .category-content {
            display: none;
            padding: 30px;
            background: #fff;
        }

        .active .category-content { display: block; }

        /* 问答三列布局 */
        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .qa-card {
            background: #f1f3f9;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(26, 35, 126, 0.1);
            cursor: pointer;
            transition: 0.3s;
        }

        .qa-card:hover { border-color: var(--light-blue); background: #e8eaf6; }

        .question { font-weight: 600; color: var(--royal-blue); margin-bottom: 10px; font-size: 1.1rem; }
        .answer {
            font-size: 0.95rem; color: #555; line-height: 1.6; display: none;
            padding-top: 10px; border-top: 1px solid rgba(0,0,0,0.05);
        }
        .answer.show { display: block; }

        /* 规则留白区 */
        .rule-placeholder {
            padding: 30px;
            text-align: center;
            color: #999;
            border: 2px dashed #ccd1e4;
            border-radius: 10px;
            font-style: italic;
        }

        @media (max-width: 1100px) { .quiz-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { 
            .quiz-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; letter-spacing: 4px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>MANMAN VIP STRATEGY</h1>
    </header>

    <div class="main-wrapper">
        
        <div class="category-section" id="section-1">
            <div class="category-header" onclick="toggleSection('section-1')">
                <span class="category-title">Customer Solutions (Q&A)</span>
                <span id="icon-1">▼</span>
            </div>
            <div class="category-content">
                <div class="quiz-grid" id="quiz-container"></div>
            </div>
        </div>

        <div class="category-section" id="section-2">
            <div class="category-header" onclick="toggleSection('section-2')">
                <span class="category-title">Operational Guidelines (MUST DO)</span>
                <span id="icon-2">▼</span>
            </div>
            <div class="category-content">
                <div class="rule-placeholder">Tambahkan konten "MUST DO" Anda di sini...</div>
            </div>
        </div>

        <div class="category-section" id="section-3">
            <div class="category-header" onclick="toggleSection('section-3')">
                <span class="category-title">Restricted Actions (DON'T DO)</span>
                <span id="icon-3">▼</span>
            </div>
            <div class="category-content">
                <div class="rule-placeholder">Tambahkan konten "DON'T DO" Anda di sini...</div>
            </div>
        </div>

    </div>

    <script>
        const quizData = [
            { q: "wd berapa ?", a: "Saya tidak bisa jamin wd berapa kak karena kaka bisa cek live rtp disitu dan live wd di situsnya." },
            { q: "kalo gak wd gimana ?", a: "Kalo ga wd, situs menyediakan kompensasi kaa dalam 1x24 jam nanti kaka akan dapat beberapa jumlah saldo." },
            { q: "bisa maxwin gak ?", a: "Kalo maxwin bisa aja ka, tapi saranku coba aja kaa dari modal kecil kalo wd kaka lanjut." },
            { q: "kalo wd bisa ajak teman ?", a: "Tentu saja bisa kak, peluang kemenangan akan jauh lebih besar jika mabar." },
            { q: "FB itu penipuan ?", a: "Itu akun buzzer pesaing yang sengaja menjelekkan kami. Situs kami resmi dan berlisensi." },
            { q: "wd dijamin aman ?", a: "WD itu keberuntungan kak, tapi saya bisa bantu kirim pola gacor dan bantu klaim bonus." },
            { q: "ini situs tipu-tipu ya ?", a: "Maaf kak, itu admin situs sebelah. Kami dijamin aman dan berlisensi." },
            { q: "berapa banyak bisa wd ?", a: "Untuk nominal tidak bisa dipastikan, tapi bisa coba pola gacor. Ada bonus 10x free spin 🥰" },
            { q: "apakah pasti bisa wd ?", a: "Kami tidak jamin menang, tapi ada data RTP live untuk membantu peluang kakak." },
            { q: "nominal wd-nya berapa ?", a: "Nominal wd tergantung dari permainan dan keberuntungan taruhan kakak." },
            { q: "main di game apa ?", a: "Kakak bisa memilih game yang sedang gacor atau RTP tinggi saat ini." }
        ];

        const container = document.getElementById('quiz-container');
        quizData.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'qa-card';
            card.onclick = (e) => {
                e.stopPropagation();
                const ans = card.querySelector('.answer');
                ans.classList.toggle('show');
            };
            card.innerHTML = `<div class="question">${i+1}. ${item.q}</div><div class="answer">${item.a}</div>`;
            container.appendChild(card);
        });

        function toggleSection(id) {
            document.getElementById(id).classList.toggle('active');
        }
    </script>
</body>
</html>

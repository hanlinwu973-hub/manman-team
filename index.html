<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manman VIP Elite Strategy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;600&display=swap');

        :root {
            /* 顶级赌场配色：黑金、暗灰、香槟色 */
            --casino-black: #0a0a0a;
            --vip-gold: linear-gradient(135deg, #fcf6ba 0%, #bf953f 22%, #fbf5b7 45%, #aa771c 80%, #917a39 100%);
            --soft-gold: #d4af37;
            --card-gray: #1a1a1a;
            --text-silver: #e0e0e0;
            --border-glow: rgba(212, 175, 55, 0.3);
        }

        body {
            background-color: var(--casino-black);
            background-image: radial-gradient(circle at 50% 50%, rgba(30,30,30,1) 0%, rgba(10,10,10,1) 100%);
            color: var(--text-silver);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 80px 0;
            text-align: center;
            background: linear-gradient(to bottom, #151515, var(--casino-black));
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            margin: 0;
            background: var(--vip-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 12px;
            filter: drop-shadow(0 0 10px rgba(191, 149, 63, 0.4));
        }

        .container {
            width: 90%;
            max-width: 1100px;
            padding: 60px 0;
        }

        /* 集合大模块框架 */
        .category-group {
            background: var(--card-gray);
            margin-bottom: 35px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            transition: all 0.4s ease;
        }

        .category-group.active {
            border-color: var(--soft-gold);
            box-shadow: 0 0 30px var(--border-glow);
        }

        .category-header {
            padding: 35px 45px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(90deg, #1f1f1f, #151515);
            position: relative;
        }

        .category-header::before {
            content: '';
            position: absolute;
            left: 0;
            height: 40%;
            width: 4px;
            background: var(--vip-gold);
        }

        .category-title {
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            letter-spacing: 3px;
            color: var(--soft-gold);
            font-weight: 700;
        }

        .category-content {
            display: none;
            padding: 40px;
            background: #121212;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
        }

        .active .category-content { display: block; }

        /* Q&A 列表项 */
        .qa-item {
            background: #1a1a1a;
            padding: 30px;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
            transition: all 0.3s;
        }

        .qa-item:hover {
            background: #222;
            border-color: rgba(212, 175, 55, 0.3);
        }

        .question {
            font-weight: 600;
            font-size: 1.15rem;
            color: #ffffff;
            display: flex;
            align-items: center;
        }

        .answer {
            max-height: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            color: #aaa;
            line-height: 1.8;
        }

        .qa-item.open .answer {
            max-height: 600px;
            opacity: 1;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
        }

        /* 空内容占位提示 */
        .empty-placeholder {
            text-align: center;
            color: rgba(255,255,255,0.1);
            font-style: italic;
            padding: 20px;
            border: 1px dashed rgba(212, 175, 55, 0.1);
        }

        .arrow { font-size: 0.8rem; color: var(--soft-gold); transition: transform 0.3s; }
        .active .arrow { transform: rotate(180deg); }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .category-header { padding: 25px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>MANMAN ELITE VIP</h1>
    </header>

    <div class="container">
        
        <div class="category-group" id="group-qa">
            <div class="category-header" onclick="toggleGroup('group-qa')">
                <span class="category-title">VIP SOLUTIONS (Q&A)</span>
                <span class="arrow">▼</span>
            </div>
            <div class="category-content" id="qa-container"></div>
        </div>

        <div class="category-group" id="group-do">
            <div class="category-header" onclick="toggleGroup('group-do')">
                <span class="category-title">ELITE STANDARDS (DO)</span>
                <span class="arrow">▼</span>
            </div>
            <div class="category-content">
                <div class="empty-placeholder">Konten standar akan segera hadir...</div>
            </div>
        </div>

        <div class="category-group" id="group-dont">
            <div class="category-header" onclick="toggleGroup('group-dont')">
                <span class="category-title">VIP RESTRICTIONS (DON'T)</span>
                <span class="arrow">▼</span>
            </div>
            <div class="category-content">
                <div class="empty-placeholder">Konten restriksi akan segera hadir...</div>
            </div>
        </div>

    </div>

    <script>
        const quizData = [
            { q: "wd berapa ?", a: "Saya tidak bisa jamin wd berapa kak karena kaka bisa cek live rtp disitu dan live wd di situsnya dan bisa lihat wd banyak dari game apa coba kaka bisa ikutin game tersebut." },
            { q: "kalo gak wd gimana ?", a: "Kalo ga wd, situs menyediakan kompensasi kaa dalam 1x24 jam nanti kaka akan dapat beberapa jumlah saldo disitus Kembali." },
            { q: "bisa maxwin gak kalo bisa aku main ?", a: "Kalo maxwin bisa aja ka, tapi saranku coba aja kaa dari modal kecil kalo wd kaka lanjut barangkali kaka maxwin." },
            { q: "kalo wd bisa ajak teman mabar ?", a: "Tentu saja bisa kak, jika kakak bisa mengajak teman untuk bermain bersama, peluang kemenangan akan jauh lebih besar." },
            { q: "FB itu penipuan ?", a: "Akun Facebook tersebut adalah akun buzzer dari situs pesaing yang sengaja menjelekkan kami. Situs kami resmi dan berlisensi VIP." },
            { q: "wd dijamin aman ?", a: "WD itu tergantung keberuntungan kak, tapi saya bisa bantu kirim pola gacor dan bantu klaim bonus deposit." },
            { q: "ini situs tipu-tipu ya ?", a: "Maaf kak, itu admin situs sebelah yang sengaja menjelekkan. Situs kami resmi dan berlisensi, dijamin aman." },
            { q: "berapa banyak bisa wd ?", a: "Untuk nominal tidak bisa dipastikan, tapi kakak bisa coba pola gacor yang saya kirim. Ada bonus 10x free spin juga 🥰" },
            { q: "apakah pasti bisa wd ?", a: "Kami tidak bisa menjamin kemenangan, tetapi ada data RTP live untuk memilih game dengan peluang menang tinggi." },
            { q: "nominal wd-nya berapa ?", a: "Nominal wd sepenuhnya tergantung dari permainan dan keberuntungan taruhan kakak selanjutnya." },
            { q: "main di game apa ?", a: "Kakak bisa memilih game yang sedang gacor atau RTP tinggi saat ini." }
        ];

        const qaContainer = document.getElementById('qa-container');
        quizData.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'qa-item';
            div.onclick = (e) => { e.stopPropagation(); div.classList.toggle('open'); };
            div.innerHTML = `
                <div class="question">${i + 1}. ${item.q}</div>
                <div class="answer"><strong style="color:var(--soft-gold)">ELITE RESPONSE:</strong><br>${item.a}</div>
            `;
            qaContainer.appendChild(div);
        });

        function toggleGroup(id) {
            document.getElementById(id).classList.toggle('active');
        }
    </script>
</body>
</html>

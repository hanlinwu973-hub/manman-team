<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manman Elite VIP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;600&display=swap');

        :root {
            --gold: #d4af37;
            --dark-gold: #8e6d13;
            --black: #050505;
            --card-bg: rgba(15, 15, 15, 0.95);
        }

        body {
            background-color: var(--black);
            background-image: 
                linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                url('https://www.transparenttextures.com/patterns/dark-leather.png'); /* 皮革纹理背景 */
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 顶部装饰栏 */
        .top-bar {
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            box-shadow: 0 0 15px var(--gold);
        }

        header {
            text-align: center;
            padding: 60px 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            width: 80%;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to bottom, #fcf6ba 0%, #bf953f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 8px;
            filter: drop-shadow(0 0 10px rgba(198, 163, 108, 0.5));
        }

        /* 解决两边太空：侧边装饰物 */
        .decor-bird {
            position: fixed;
            left: 2%;
            top: 50%;
            transform: translateY(-50%);
            width: 15vw;
            opacity: 0.15;
            pointer-events: none;
        }

        .decor-dragon {
            position: fixed;
            right: 2%;
            top: 50%;
            transform: translateY(-50%);
            width: 15vw;
            opacity: 0.15;
            pointer-events: none;
        }

        .main-container {
            width: 90%;
            max-width: 1000px;
            margin: 40px 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            z-index: 10;
        }

        /* 赌场筹码/卡片样式 */
        .casino-card {
            perspective: 1000px; /* 为翻转效果准备 */
            cursor: pointer;
            height: 220px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .casino-card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            border-radius: 12px;
            border: 2px solid var(--dark-gold);
            background: var(--card-bg);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .card-front::after {
            content: 'CLICK TO REVEAL';
            position: absolute;
            bottom: 15px;
            font-size: 0.7rem;
            color: var(--gold);
            letter-spacing: 2px;
            opacity: 0.6;
        }

        .card-back {
            transform: rotateY(180deg);
            border-color: #fff;
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
        }

        .question-text {
            font-size: 1.2rem;
            text-align: center;
            font-weight: 600;
            color: #fcf6ba;
        }

        .answer-text {
            font-size: 1rem;
            text-align: center;
            line-height: 1.6;
            color: #ddd;
        }

        /* 装饰粒子效果 */
        .dot {
            position: fixed;
            width: 2px;
            height: 2px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0.3;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .main-container { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
            .decor-bird, .decor-dragon { display: none; }
        }
    </style>
</head>
<body>

    <div class="top-bar"></div>

    <img class="decor-bird" src="https://cdn-icons-png.flaticon.com/512/2619/2619277.png" alt="bird">
    <img class="decor-dragon" src="https://cdn-icons-png.flaticon.com/512/2830/2830305.png" alt="dragon">

    <header>
        <h1>MANMAN ELITE VIP</h1>
    </header>

    <div class="main-container" id="quiz-grid"></div>

    <script>
        const quizData = [
            { q: "wd berapa ?", a: "Saya tidak bisa jamin wd berapa kak karena kaka bisa cek live rtp disitu dan live wd di situsnya dan bisa lihat wd banyak dari game apa coba kaka bisa ikutin game tersebut." },
            { q: "kalo gak wd gimana ?", a: "Kalo ga wd, situs menyediakan kompensasi kaa dalam 1x24 jam nanti kaka akan dapat beberapa jumlah saldo disitus Kembali." },
            { q: "bisa maxwin gak ?", a: "Kalo maxwin bisa aja ka, tapi saranku coba aja kaa dari modal kecil kalo wd kaka lanjut barangkali kaka maxwin." },
            { q: "kalo wd bisa ajak teman ?", a: "Tentu saja bisa kak, jika kakak bisa mengajak teman untuk bermain bersama, peluang kemenangan akan jauh lebih besar." },
            { q: "FB itu penipuan ?", a: "Akun Facebook tersebut adalah akun buzzer dari situs pesaing yang sengaja menjelekkan kami. Jangan khawatir, situs kami resmi." },
            { q: "wd dijamin aman ?", a: "WD itu tergantung keberuntungan kak, tapi saya bisa bantu kirim pola gacor dan bantu klaim bonus deposit." }
        ];

        const grid = document.getElementById('quiz-grid');

        quizData.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'casino-card';
            card.onclick = () => card.classList.toggle('flipped');
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-front">
                        <div class="question-text">${item.q}</div>
                    </div>
                    <div class="card-back">
                        <div class="answer-text">${item.a}</div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });

        // 随机生成背景微光点
        for(let i=0; i<30; i++) {
            let dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.top = Math.random() * 100 + 'vh';
            dot.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(dot);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manman VIP Elite Strategy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;600&display=swap');

        :root {
            --casino-black: #0a0a0a;
            --vip-gold: linear-gradient(135deg, #fcf6ba 0%, #bf953f 22%, #fbf5b7 45%, #aa771c 80%, #917a39 100%);
            --soft-gold: #d4af37;
            --card-gray: #1a1a1a;
            --text-silver: #e0e0e0;
            --border-glow: rgba(212, 175, 55, 0.3);
        }

        body {
            background-color: var(--casino-black);
            background-image: radial-gradient(circle at 50% 50%, rgba(30,30,30,1) 0%, rgba(10,10,10,1) 100%);
            color: var(--text-silver);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 70px 0;
            text-align: center;
            background: linear-gradient(to bottom, #151515, var(--casino-black));
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.8rem;
            margin: 0;
            background: var(--vip-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 10px;
            filter: drop-shadow(0 0 10px rgba(191, 149, 63, 0.3));
        }

        .container {
            width: 90%;
            max-width: 1000px;
            padding: 50px 0;
        }

        /* 三段式集合框架 */
        .category-group {
            background: var(--card-gray);
            margin-bottom: 30px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
        }

        .category-group.active {
            border-color: var(--soft-gold);
            box-shadow: 0 0 25px var(--border-glow);
        }

        .category-header {
            padding: 30px 40px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #151515;
            position: relative;
        }

        .category-header::before {
            content: '';
            position: absolute;
            left: 0;
            height: 50%;
            width: 4px;
            background: var(--vip-gold);
        }

        .category-title {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            letter-spacing: 2px;
            color: var(--soft-gold);
        }

        .category-content {
            display: none;
            padding: 30px;
            background: #0f0f0f;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
        }

        .active .category-content { display: block; }

        /* Q&A 列表交互 */
        .qa-item {
            background: #181818;
            padding: 25px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.02);
            cursor: pointer;
            transition: 0.3s;
        }

        .qa-item:hover { border-color: rgba(212, 175, 55, 0.3); background: #202020; }

        .question { font-weight: 600; color: #fff; font-size: 1.1rem; }

        .answer {
            max-height: 0;
            overflow: hidden;
            transition: all 0.5s ease;
            opacity: 0;
            color: #999;
            line-height: 1.7;
        }

        .qa-item.open .answer {
            max-height: 500px;
            opacity: 1;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
        }

        /* 图片容器样式 */
        .media-container {
            width: 100%;
            max-width: 750px;
            margin: 0 auto;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .media-container img {
            width: 100%;
            display: block;
            height: auto;
        }

        .arrow { color: var(--soft-gold); transition: 0.3s; }
        .active .arrow { transform: rotate(180deg); }

        @media (max-width: 768px) {
            h1 { font-size: 1.6rem; letter-spacing: 5px; }
            .category-header { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>MANMAN ELITE VIP</h1>
    </header>

    <div class="container">
        
        <div class="category-group" id="group-qa">
            <div class="category-header" onclick="toggleGroup('group-qa')">
                <span class="category-title">VIP SOLUTIONS (Q&A)</span>
                <span class="arrow">▼</span>
            </div>
            <div class="category-content" id="qa-container"></div>
        </div>

        <div class="category-group" id="group-do">
            <div class="category-header" onclick="toggleGroup('group-do')">
                <span class="category-title">ELITE STANDARDS (DO)</span>
                <span class="arrow">▼</span>
            </div>
            <div class="category-content">
                <div class="media-container">
                    <img src="image_38caa4.jpg" alt="Panduan Keamanan Casino">
                </div>
            </div>
        </div>

        <div class="category-group" id="group-dont">
            <div class="category-header" onclick="toggleGroup('group-dont')">
                <span class="category-title">VIP RESTRICTIONS (DON'T)</span>
                <span class="arrow">▼</span>
            </div>
            <div class="category-content">
                <div class="media-container" style="border-color: #d50000;">
                    <img src="image_38c708.jpg" alt="Peringatan Keras">
                </div>
            </div>
        </div>

    </div>

    <script>
        const quizData = [
            { q: "wd berapa ?", a: "Saya tidak bisa jamin wd berapa kak karena kaka bisa cek live rtp disitu dan live wd di situsnya." },
            { q: "kalo gak wd gimana ?", a: "Kalo ga wd, situs menyediakan kompensasi kaa dalam 1x24 jam nanti kaka akan dapat saldo Kembali." },
            { q: "bisa maxwin gak kalo bisa aku main ?", a: "Kalo maxwin bisa aja ka, tapi saranku coba aja kaa dari modal kecil dulu." },
            { q: "kalo wd bisa ajak teman mabar ?", a: "Tentu saja bisa kak, mengajak teman bermain bersama meningkatkan peluang kemenangan." },
            { q: "FB itu penipuan ?", a: "Akun FB itu buzzer pesaing kak. Situs kami resmi dan berlisensi VIP." },
            { q: "wd dijamin aman ?", a: "WD aman kak, saya bantu kirim pola gacor dan bantu klaim bonus deposit." },
            { q: "ini situs tipu-tipu ya ?", a: "Maaf kak, itu admin situs sebelah. Situs kami resmi, berlisensi, dan dijamin aman." },
            { q: "berapa banyak bisa wd ?", a: "Tergantung keberuntungan, tapi coba pola gacor yang saya kirim kak. Ada bonus free spin juga!" },
            { q: "apakah pasti bisa wd ?", a: "Kami tidak jamin menang, tapi ada RTP live untuk pilih game peluang tinggi." },
            { q: "nominal wd-nya berapa ?", a: "Nominal wd tergantung permainan dan keberuntungan taruhan kakak." },
            { q: "main di game apa ?", a: "Pilih game yang sedang gacor atau memiliki RTP tinggi saat ini kak." }
        ];

        const qaContainer = document.getElementById('qa-container');
        quizData.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'qa-item';
            div.onclick = (e) => { e.stopPropagation(); div.classList.toggle('open'); };
            div.innerHTML = `
                <div class="question">${i + 1}. ${item.q}</div>
                <div class="answer"><strong style="color:var(--soft-gold)">ELITE RESPONSE:</strong><br>${item.a}</div>
            `;
            qaContainer.appendChild(div);
        });

        function toggleGroup(id) {
            document.getElementById(id).classList.toggle('active');
        }
    </script>
</body>
</html>

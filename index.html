<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Manman Elite</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #aa841e;
            --black: #0a0a0a;
            --glass: rgba(20, 20, 20, 0.85);
        }

        body {
            background-color: var(--black);
            color: white;
            font-family: 'Playfair Display', serif, system-ui;
            margin: 0;
            overflow-x: hidden;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            min-height: 100vh;
        }

        /* 背景流光特效 */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/dark-leather.png');
            opacity: 0.3;
            pointer-events: none;
        }

        /* 顶部霸气标题 */
        .header-vip {
            text-align: center;
            padding: 50px 0;
            background: linear-gradient(to bottom, rgba(212,175,55,0.1) 0%, transparent 100%);
        }

        .header-vip h1 {
            font-size: 3.5rem;
            margin: 0;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 10px;
            filter: drop-shadow(0 0 15px rgba(212,175,55,0.3));
        }

        /* 侧边印尼图腾装饰 */
        .side-totem {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 250px;
            height: 600px;
            opacity: 0.2;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .totem-left { left: 20px; border-right: 2px solid var(--gold); }
        .totem-right { right: 20px; border-left: 2px solid var(--gold); }

        .totem-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            color: var(--gold);
            font-size: 5rem;
            font-weight: bold;
            opacity: 0.1;
            width: 100%;
            text-align: center;
        }

        /* 问答主容器 */
        .main-stage {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* 筹码卡片设计 */
        .vip-card {
            background: var(--glass);
            border: 1px solid var(--gold);
            border-radius: 0;
            margin-bottom: 40px;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .vip-card::before {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 1px solid var(--dark-gold);
            opacity: 0.3;
        }

        .vip-card:hover {
            transform: scale(1.02);
            border-color: #fff;
            box-shadow: 0 0 30px rgba(212,175,55,0.2);
        }

        .card-inner { padding: 30px; }

        .question-txt {
            font-size: 1.5rem;
            color: #fcf6ba;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* 翻牌特效按钮 */
        .flip-btn {
            background: linear-gradient(45deg, var(--dark-gold), var(--gold));
            border: none;
            color: black;
            padding: 12px 35px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            transition: 0.3s;
        }

        .flip-btn:hover {
            letter-spacing: 5px;
            background: white;
        }

        .ans-content {
            height: 0;
            overflow: hidden;
            transition: 0.5s;
            opacity: 0;
            color: #ddd;
            line-height: 1.8;
            border-top: 0px solid var(--gold);
        }

        .ans-content.reveal {
            height: auto;
            padding-top: 25px;
            margin-top: 20px;
            opacity: 1;
            border-top: 1px solid var(--dark-gold);
        }

        /* 装饰粒子 */
        .particle {
            position: fixed;
            background: var(--gold);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.5;
            animation: float 10s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-100px) rotate(360deg); }
        }

        @media (max-width: 1100px) {
            .side-totem { display: none; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    
    <div class="side-totem totem-left">
        <div class="totem-text">CENDRAWASIH</div>
    </div>
    <div class="side-totem totem-right">
        <div class="totem-text">HARIMAU INDO</div>
    </div>

    <header class="header-vip">
        <h1>MANMAN ELITE</h1>
    </header>

    <main class="main-stage" id="stage"></main>

    <script>
        const data = [
            { q: "wd berapa ?", a: "Saya tidak bisa jamin wd berapa kak karena kaka bisa cek live rtp disitu dan live wd di situsnya dan bisa lihat wd banyak dari game apa coba kaka bisa ikutin game tersebut." },
            { q: "kalo gak wd gimana ?", a: "Kalo ga wd, situs menyediakan kompensasi kaa dalam 1x24 jam nanti kaka akan dapat beberapa jumlah saldo disitus Kembali." },
            { q: "bisa maxwin gak kalo bisa aku main ?", a: "Kalo maxwin bisa aja ka, tapi saranku coba aja kaa dari modal kecil kalo wd kaka lanjut barangkali kaka maxwin dan semisal ga maxwin paling-paling wd tipis dan kalo ga wd ada kompensasi ka." },
            { q: "kalo wd bisa ajak teman mabar ?", a: "Tentu saja bisa kak, jika kakak bisa mengajak teman untuk bermain bersama dan mengikuti strategi kami, peluang kemenangan akan jauh lebih besar." },
            { q: "apa situs di Facebook itu penipuan ?", a: "Akun Facebook tersebut adalah akun buzzer dari situs pesaing yang sengaja menjelekkan kami. Beberapa bahkan memanipulasi ID pengguna, seperti mengubah deposit 50rb menjadi 200rb." },
            { q: "wd ke Dijamin/JP beneran aman ?", a: "WD itu tergantung keberuntungan kak, tapi saya bisa bantu kirim pola gacor dan bantu klaim bonus deposit serta free spin, asalkan kakak deposit pakai nomor yang terdaftar." },
            { q: "ini situs tipu-tipu ya ?", a: "Maaf kak, kemungkinan besar itu admin situs sebelah yang sengaja menjelekkan situs kami. Itu hanya kerjaan buzzer. Jangan khawatir, situs kami resmi dan berlisensi, dijamin aman." },
            { q: "berapa banyak yang bisa di-wd ?", a: "Mengenai wd, saya tidak bisa kasih nominal pastinya kak, tapi kakak bisa coba pola gacor yang saya kirim. Setelah deposit, kakak dapat bonus 10x free spin untuk semua game 🥰" },
            { q: "apakah pasti bisa wd ?", a: "Kami tidak bisa menjamin kemenangan, tetapi ada data RTP live yang bisa digunakan untuk memilih game dengan peluang menang tinggi." },
            { q: "nominal wd-nya berapa ?", a: "Untuk nominal wd, kami tidak bisa memberikan info akurat karena itu sepenuhnya tergantung dari permainan dan taruhan kakak selanjutnya." },
            { q: "main di game apa ?", a: "Kakak bisa memilih game yang sedang gacor atau yang memiliki persentase RTP tinggi saat ini." }
        ];

        const stage = document.getElementById('stage');

        data.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'vip-card';
            card.innerHTML = `
                <div class="card-inner">
                    <div class="question-txt">QUESTION ${i+1}: ${item.q}</div>
                    <button class="flip-btn" onclick="showAns(${i})">Buka Kartu</button>
                    <div class="ans-content" id="ans-${i}">
                        <strong>VIP ADVICE:</strong><br>${item.a}
                    </div>
                </div>
            `;
            stage.appendChild(card);
        });

        function showAns(i) {
            const el = document.getElementById('ans-'+i);
            el.classList.toggle('reveal');
        }

        // 生成装饰粒子
        for(let i=0; i<20; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.width = p.style.height = Math.random() * 5 + 'px';
            p.style.animationDuration = (Math.random() * 5 + 5) + 's';
            p.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(p);
        }
    </script>
</body>
</html>

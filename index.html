<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manman VIP Strategy Final</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;600&display=swap');
        :root {
            --casino-black: #0a0a0a;
            --vip-gold: linear-gradient(135deg, #fcf6ba 0%, #bf953f 22%, #fbf5b7 45%, #aa771c 80%, #917a39 100%);
            --soft-gold: #d4af37;
            --card-gray: #1a1a1a;
            --text-silver: #e0e0e0;
            --warning-red: #ff4d4d;
            --success-green: #28a745;
        }
        body { 
            background-color: var(--casino-black); 
            color: var(--text-silver); 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .container { width: 95%; max-width: 1000px; padding: 40px 0; }

        /* 栏目通用样式 */
        .category-group { 
            background: var(--card-gray); 
            margin-bottom: 25px; 
            border: 1px solid rgba(212, 175, 55, 0.15); 
        }
        .category-header { 
            padding: 20px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            background: #151515; 
            border-left: 4px solid var(--soft-gold); 
        }
        .category-title { 
            font-family: 'Cinzel', serif; 
            color: var(--soft-gold); 
            font-size: 1.1rem; 
            letter-spacing: 1px; 
        }
        .category-content { 
            padding: 20px; 
            display: none; 
            background: #0f0f0f; 
        }

        /* Q&A 网格 */
        .qa-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 12px; 
        }
        .qa-item {
            background: rgba(255,255,255,0.03); 
            padding: 15px; 
            border: 1px solid rgba(212,175,55,0.1);
            font-size: 0.85rem; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .qa-item:hover { 
            border-color: var(--soft-gold); 
            background: rgba(212,175,55,0.08); 
        }

        /* 答案面板 */
        .answer-panel {
            display: none; 
            background: #1a1a1a; 
            border: 1px solid var(--soft-gold);
            padding: 15px; 
            margin-top: 10px; 
            font-size: 0.9rem; 
            line-height: 1.6; 
            color: #fff;
        }

        /* 提示板 */
        .notice-board { 
            background: #111; 
            border: 1px solid rgba(212,175,55,0.2); 
            padding: 20px; 
            margin-bottom: 20px; 
        }
        .restriction-list, .mustdo-list { 
            list-style: none; 
            padding: 0; 
        }
        .restriction-list li, .mustdo-list li { 
            padding: 10px 0; 
            border-bottom: 1px dashed #333; 
            font-size: 0.87rem; 
            display: flex; 
            align-items: flex-start;
            line-height: 1.5;
        }
        .restriction-list li::before { 
            content: '❌'; 
            margin-right: 12px; 
            color: var(--warning-red);
            font-size: 1.1rem;
        }
        .mustdo-list li::before { 
            content: '✅'; 
            margin-right: 12px; 
            color: var(--success-green);
            font-size: 1.1rem;
        }

        .report-btn {
            display: block; 
            text-align: center; 
            padding: 12px; 
            background: var(--vip-gold);
            color: #000; 
            text-decoration: none; 
            font-weight: 700; 
            margin-top: 15px;
            border-radius: 4px;
        }
    </style>
</head>

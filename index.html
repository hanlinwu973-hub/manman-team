<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manman Strategy Elite</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;600&display=swap');

        :root {
            --emerald: #2e7d32;
            --neon-green: #4caf50;
            --black: #050505;
            --dark-card: rgba(10, 20, 10, 0.95);
        }

        body {
            background-color: var(--black);
            background-image: radial-gradient(circle at center, #0d1a0d 0%, #020202 100%);
            color: #e0e0e0;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 50px 0;
            width: 100%;
            border-bottom: 1px solid rgba(76, 175, 80, 0.2);
            position: relative;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            letter-spacing: 8px;
            background: linear-gradient(to bottom, #a5d6a7, #2e7d32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        /* 解决两侧太空：背景图腾装饰 */
        body::before, body::after {
            content: '🐸';
            position: fixed;
            top: 50%;
            font-size: 20vw;
            opacity: 0.03;
            pointer-events: none;
            transform: translateY(-50%);
        }
        body::before { left: 2%; }
        body::after { right: 2%; }

        /* 主容器 */
        .main-wrapper {
            width: 90%;
            max-width: 1200px;
            margin-top: 30px;
            padding-bottom: 100px;
        }

        /* 大模块样式 */
        .category-section {
            margin-bottom: 25px;
            border: 1px solid rgba(76, 175, 80, 0.3);
            background: var(--dark-card);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .category-header {
            padding: 25px 40px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(90deg, rgba(46, 125, 50, 0.1), transparent);
        }

        .category-header:hover {
            background: rgba(46, 125, 50, 0.2);
        }

        .category-title {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            color: var(--neon-green);
            letter-spacing: 2px;
        }

        .category-content {
            display: none; /* 默认隐藏 */
            padding: 30px;
            border-top: 1px solid rgba(76, 175, 80, 0.2);
        }

        /* 当点击展开时使用的类 */
        .active .category-content {
            display: block;
        }

        /* 内部网格：解决大屏横向填充问题 */
        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .rule-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .rule-item {
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--neon-green);
            font-size: 1rem;
        }

        .rule-item.prohibit {
            border-left-color: #c62828; /* 禁止事项用红色 */
        }

        /* 问答卡片样式 */
        .qa-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: 0.3s;
        }

        .qa-card:hover {
            border-color: var(--neon-green);
            background: rgba(76, 175, 80, 0.05);
        }

        .question {
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .answer {
            font-size: 0.9rem;
            color: #aaa;
            line-height: 1.6;
            display: none; /* 默认隐藏答案 */
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .answer.show {
            display: block;
        }

        @media (max-width: 1100px) { .quiz-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { 
            .quiz-grid, .rule-list { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>MANMAN ELITE STRATEGY</h1>
    </header>

    <div class="main-wrapper">
        
        <div class="category-section" id="section-1">
            <div class="category-header" onclick="toggleSection('section-1')">
                <span class="category-title">客户问题解决办法 (Q&A)</span>
                <span>▼</span>
            </div>
            <div class="category-content">
                <div class="quiz-grid" id="quiz-container"></div>
            </div>
        </div>

        <div class="category-section" id="section-2">
            <div class="category-header" onclick="toggleSection('section-2')">
                <span class="category-title">必须做的事情 (DO)</span>
                <span>▼</span>
            </div>
            <div class="category-content">
                <div class="rule-list">
                    <div class="rule-item">必须保持礼貌和VIP级别的沟通语气。</div>
                    <div class="rule-item">必须在3分钟内回复客户的任何疑问。</div>
                    <div class="rule-item">必须引导客户查看当前的实时 RTP 数据。</div>
                    <div class="rule-item">必须确保客户使用的注册号码是正确的。</div>
                </div>
            </div>
        </div>

        <div class="category-section" id="section-3">
            <div class="category-header" onclick="toggleSection('section-3')">
                <span class="category-title">禁止做的事情 (DON'T)</span>
                <span>▼</span>
            </div>
            <div class="category-content">
                <div class="rule-list">
                    <div class="rule-item prohibit">严禁向客户百分之百保证盈利。</div>
                    <div class="rule-item prohibit">严禁攻击客户或使用侮辱性语言。</div>
                    <div class="rule-item prohibit">严禁在没有核实的情况下随意更改客户 ID。</div>
                    <div class="rule-item prohibit">严禁私自向客户承诺站外交易。</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const quizData = [
            { q: "wd berapa ?", a: "Saya tidak bisa jamin wd berapa kak karena kaka bisa cek live rtp disitu dan live wd di situsnya." },
            { q: "kalo gak wd gimana ?", a: "Kalo ga wd, situs menyediakan kompensasi kaa dalam 1x24 jam nanti kaka akan dapat beberapa jumlah saldo." },
            { q: "bisa maxwin gak ?", a: "Kalo maxwin bisa aja ka, tapi saranku coba aja kaa dari modal kecil kalo wd kaka lanjut." },
            { q: "kalo wd bisa ajak teman ?", a: "Tentu saja bisa kak, peluang kemenangan akan jauh lebih besar jika mabar." },
            { q: "FB itu penipuan ?", a: "Itu akun buzzer pesaing yang sengaja menjelekkan kami. Situs kami resmi dan berlisensi." },
            { q: "wd dijamin aman ?", a: "WD itu keberuntungan kak, tapi saya bisa bantu kirim pola gacor dan bantu klaim bonus." },
            { q: "ini situs tipu-tipu ya ?", a: "Maaf kak, itu admin situs sebelah. Kami dijamin aman dan berlisensi." },
            { q: "berapa banyak bisa wd ?", a: "Untuk nominal tidak bisa dipastikan, tapi bisa coba pola gacor. Ada bonus 10x free spin 🥰" },
            { q: "apakah pasti bisa wd ?", a: "Kami tidak jamin menang, tapi ada data RTP live untuk membantu peluang kakak." },
            { q: "nominal wd-nya berapa ?", a: "Nominal wd tergantung dari permainan dan keberuntungan taruhan kakak." },
            { q: "main di game apa ?", a: "Kakak bisa memilih game yang sedang gacor atau RTP tinggi saat ini." }
        ];

        // 渲染问答
        const container = document.getElementById('quiz-container');
        quizData.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'qa-card';
            card.onclick = (e) => {
                e.stopPropagation();
                const ans = card.querySelector('.answer');
                ans.classList.toggle('show');
            };
            card.innerHTML = `
                <div class="question">${i+1}. ${item.q}</div>
                <div class="answer">${item.a}</div>
            `;
            container.appendChild(card);
        });

        // 切换模块展开/收起
        function toggleSection(id) {
            document.getElementById(id).classList.toggle('active');
        }
    </script>
</body>
</html>
